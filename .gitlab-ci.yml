image: rust:latest

stages:
  - check
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/target"
  CARGO_TERM_COLOR: always
  RUSTUP_DIST_SERVER: "https://mirrors.nju.edu.cn/rustup"
  RUSTUP_UPDATE_ROOT: "https://mirrors.nju.edu.cn/rustup/rustup"
  GUI_BUN_IMAGE: "oven/bun:1.3.14"

.cargo-cache:
  cache:
    key: "cargo-${CI_PROJECT_ID}"
    paths:
      - .cargo/bin
      - .cargo/registry/index
      - .cargo/registry/cache
      - .cargo/git/db
      - target
    policy: pull-push

.cargo-nju-mirror:
  before_script:
    - mkdir -p "$CARGO_HOME"
    - |
      cat > "$CARGO_HOME/config.toml" << 'EOF'
      [source.crates-io]
      replace-with = 'nju'

      [source.nju]
      registry = 'sparse+https://mirrors.nju.edu.cn/crates.io-index/'
      EOF

.gui-cache:
  cache:
    key: "gui-${CI_PROJECT_ID}"
    paths:
      - apps/secaudit-gui/node_modules
    policy: pull-push

rust-check:
  extends:
    - .cargo-cache
    - .cargo-nju-mirror
  stage: check
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo test --workspace --all-targets

gui-frontend-check:
  extends: .gui-cache
  stage: check
  image: "$GUI_BUN_IMAGE"
  before_script:
    - bun --version
  script:
    - bun ci --cwd apps/secaudit-gui
    - bun run --cwd apps/secaudit-gui check

gui-tauri-check:
  extends: .cargo-cache
  stage: check
  before_script:
    - sed -i 's|http://deb.debian.org|http://mirrors.nju.edu.cn|g' /etc/apt/sources.list.d/*.sources /etc/apt/sources.list 2>/dev/null; true
    - apt-get update
    - apt-get install -y --no-install-recommends pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
    - rustup component add rustfmt clippy
    - mkdir -p "$CARGO_HOME"
    - |
      cat > "$CARGO_HOME/config.toml" << 'EOF'
      [source.crates-io]
      replace-with = 'nju'

      [source.nju]
      registry = 'sparse+https://mirrors.nju.edu.cn/crates.io-index/'
      EOF
  script:
    - cargo fmt --manifest-path apps/secaudit-gui/src-tauri/Cargo.toml --check
    - cargo clippy --manifest-path apps/secaudit-gui/src-tauri/Cargo.toml --all-targets -- -D warnings
    - cargo test --manifest-path apps/secaudit-gui/src-tauri/Cargo.toml --all-targets
    - git diff --exit-code -- apps/secaudit-gui/src/bindings

build:
  extends:
    - .cargo-cache
    - .cargo-nju-mirror
  stage: build
  needs: ["rust-check", "gui-frontend-check", "gui-tauri-check"]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - cargo build --release --workspace
  artifacts:
    name: "release-${CI_COMMIT_SHORT_SHA}"
    expire_in: 1 week
    paths:
      - target/release/secaudit

release:
  stage: deploy
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - mkdir -p dist
    - cp target/release/secaudit dist/
    - tar -czf "dist/securagent-${CI_COMMIT_TAG}.tar.gz" -C dist secaudit
  artifacts:
    name: "dist-${CI_COMMIT_TAG}"
    expire_in: 1 month
    paths:
      - "dist/securagent-${CI_COMMIT_TAG}.tar.gz"
