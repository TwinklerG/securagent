image: rust:latest

stages:
  - quality
  - test
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/target"
  CARGO_TERM_COLOR: always

cache:
  key: "cargo-${CI_PROJECT_ID}"
  paths:
    - .cargo/bin
    - .cargo/registry/index
    - .cargo/registry/cache
    - .cargo/git/db
    - target
  policy: pull-push

quality:
  stage: quality
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings

test:
  stage: test
  needs: ["quality"]
  script:
    - cargo test --workspace --all-targets

build:
  stage: build
  needs: ["test"]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - cargo build --release --workspace
  artifacts:
    name: "release-${CI_COMMIT_SHORT_SHA}"
    expire_in: 1 week
    paths:
      - target/release/secaudit

release:
  stage: deploy
  needs: ["build"]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - mkdir -p dist
    - cp target/release/secaudit dist/
    - tar -czf "dist/securagent-${CI_COMMIT_TAG}.tar.gz" -C dist secaudit
  artifacts:
    name: "dist-${CI_COMMIT_TAG}"
    expire_in: 1 month
    paths:
      - "dist/securagent-${CI_COMMIT_TAG}.tar.gz"
