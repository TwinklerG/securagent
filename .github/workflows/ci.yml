name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GUI_BUN_VERSION: 1.3.14

jobs:
  rust-check:
    name: Rust check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

  gui-frontend-check:
    name: GUI frontend check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.GUI_BUN_VERSION }}

      - name: Install frontend dependencies
        run: bun ci --cwd apps/secaudit-gui

      - name: Run frontend checks
        run: bun run --cwd apps/secaudit-gui check

  gui-tauri-check:
    name: GUI Tauri check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/secaudit-gui/src-tauri -> target

      - name: Check Tauri formatting
        run: cargo fmt --manifest-path apps/secaudit-gui/src-tauri/Cargo.toml --check

      - name: Run Tauri clippy
        run: cargo clippy --manifest-path apps/secaudit-gui/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run Tauri tests
        run: cargo test --manifest-path apps/secaudit-gui/src-tauri/Cargo.toml --all-targets

      - name: Verify generated bindings are committed
        run: git diff --exit-code -- apps/secaudit-gui/src/bindings

  build:
    name: Build release binary
    runs-on: ubuntu-24.04
    needs:
      - rust-check
      - gui-frontend-check
      - gui-tauri-check
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --release --workspace

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: target/release/secaudit

  release:
    name: Package release artifact
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: dist

      - name: Package release tarball
        run: |
          chmod +x dist/secaudit
          tar -czf "dist/securagent-${GITHUB_REF_NAME}.tar.gz" -C dist secaudit

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/securagent-${{ github.ref_name }}.tar.gz
