name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 快速质量检查（Linux） ──────────────────────────────────────────────────
  check:
    name: Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/secaudit-gui/src-tauri -> apps/secaudit-gui/src-tauri/target

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

  # ── 构建 secaudit CLI（6 个目标平台） ─────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.name }})
    needs: check
    if: ${{ !cancelled() && (needs.check.result == 'success' || needs.check.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: secaudit
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: secaudit
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: secaudit
          - name: macOS x86_64
            os: macos-14
            target: x86_64-apple-darwin
            binary: secaudit
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: secaudit.exe
          - name: Windows ARM64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: secaudit.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build secaudit
        run: cargo build --release --bin secaudit --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secaudit-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ── 构建 Tauri GUI（6 个目标平台） ───────────────────────────────────────
  build-gui:
    name: Build GUI (${{ matrix.name }})
    needs: check
    if: ${{ !cancelled() && (needs.check.result == 'success' || needs.check.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            arch: linux-x86_64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            arch: linux-arm64
          - name: macOS ARM64
            os: macos-latest
            arch: macos-arm64
          - name: macOS x86_64
            os: macos-14
            arch: macos-x86_64
          - name: Windows x86_64
            os: windows-latest
            arch: windows-x86_64
          - name: Windows ARM64
            os: windows-11-arm
            arch: windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/secaudit-gui/src-tauri -> apps/secaudit-gui/src-tauri/target

      - name: Install frontend dependencies
        working-directory: apps/secaudit-gui
        run: bun install

      - name: Build Tauri app
        working-directory: apps/secaudit-gui
        run: bun run tauri build

      - name: Upload bundles (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: secaudit-gui-${{ matrix.arch }}
          path: |
            apps/secaudit-gui/src-tauri/target/release/bundle/deb/*.deb
            apps/secaudit-gui/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload bundles (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: secaudit-gui-${{ matrix.arch }}
          path: |
            apps/secaudit-gui/src-tauri/target/release/bundle/dmg/*.dmg
            apps/secaudit-gui/src-tauri/target/release/bundle/macos/*.app.tar.gz

      - name: Upload bundles (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: secaudit-gui-${{ matrix.arch }}
          path: |
            apps/secaudit-gui/src-tauri/target/release/bundle/msi/*.msi
            apps/secaudit-gui/src-tauri/target/release/bundle/nsis/*.exe

  # ── 创建 GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten release assets
        run: |
          mkdir -p release-assets

          # === secaudit CLI 二进制（Rust target → 友好名称） ===
          cp artifacts/secaudit-x86_64-unknown-linux-gnu/secaudit       release-assets/secaudit-linux-x86_64
          cp artifacts/secaudit-aarch64-unknown-linux-gnu/secaudit      release-assets/secaudit-linux-arm64
          cp artifacts/secaudit-aarch64-apple-darwin/secaudit           release-assets/secaudit-macos-arm64
          cp artifacts/secaudit-x86_64-apple-darwin/secaudit            release-assets/secaudit-macos-x86_64
          cp artifacts/secaudit-x86_64-pc-windows-msvc/secaudit.exe     release-assets/secaudit-windows-x86_64.exe
          cp artifacts/secaudit-aarch64-pc-windows-msvc/secaudit.exe    release-assets/secaudit-windows-arm64.exe

          # === Tauri GUI 安装包（按产物类型自动发现） ===
          for dir in artifacts/secaudit-gui-*/; do
            find "$dir" -type f \
              \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) \
              -exec cp {} release-assets/ \;
          done

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
