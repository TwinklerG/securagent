# 自定义安全审计规则示例
# 将此文件放在 rules/ 目录下，secaudit 启动时自动加载

[[rules]]
id = "VULN-EXT-001"
cwe_id = "CWE-327"
name = "弱加密算法"
severity = "medium"
pattern = '(?i)(?:md5|sha1)\s*\('
languages = ["python", "javascript", "rust"]
description = "检测到使用弱加密算法（MD5/SHA1），应使用 SHA-256 或更强的算法"

[[rules]]
id = "VULN-EXT-002"
cwe_id = "CWE-319"
name = "明文传输敏感数据"
severity = "medium"
pattern = '(?i)http://(?!localhost|127\.0\.0\.1)'
languages = ["python", "javascript", "rust"]
description = "检测到使用 HTTP 明文协议传输数据，应使用 HTTPS"

[[rules]]
id = "VULN-EXT-003"
cwe_id = "CWE-614"
name = "Cookie 缺少安全属性"
severity = "medium"
pattern = '(?i)set.?cookie.*(?:secure\s*=\s*false|httponly\s*=\s*false)'
languages = ["python", "javascript"]
description = "检测到 Cookie 未设置 Secure 或 HttpOnly 属性"
